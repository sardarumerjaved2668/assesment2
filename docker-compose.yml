version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: shopnext-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: fullstack

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopnext-backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    depends_on:
      - mongo
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/fullstack
      DATABASE_NAME: fullstack
      JWT_SECRET: change-this-in-production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopnext-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001

volumes:
  mongo_data:
